<!DOCTYPE html>
<html>

<head>

    <meta name="viewport"

<body>

<div class="letter">

    <h1>❤️ To My Love ❤️</h1>

    <p>
        Every moment spent with you
        has been a blessing.
    </p>

    <p>
        Thank you for your kindness,
        your patience,
        your love,
        and your beautiful smile.
    </p>

    <p>
        No matter what happens,
        I will always cherish
        the memories we have created.
    </p>

    <h2>
        I Love You ❤️
    </h2>

</div>
